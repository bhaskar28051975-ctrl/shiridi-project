<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Krishna Caterers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen font-sans pb-24">

    <!-- Top Branding Header -->
    <div class="bg-red-700 text-white sticky top-0 z-50 px-4 py-4 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tight uppercase">Sai Krishna Caterers</h1>
                <p class="text-[10px] text-red-100 uppercase tracking-widest font-semibold mt-0.5">Shirdi Train Delivery Service</p>
            </div>
            <button onclick="window.location.reload()" class="bg-white/10 hover:bg-white/20 text-white font-bold text-xs px-3 py-1.5 rounded-lg tracking-wider uppercase border border-white/20">
                Refresh
            </button>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-6">
        <!-- Section Heading -->
        <div class="flex items-center gap-3 mb-6">
            <div class="w-1.5 h-7 bg-red-700 rounded-full"></div>
            <h2 class="text-lg font-extrabold uppercase text-gray-800 tracking-wide">Select Food Items</h2>
        </div>

        <!-- Side-by-Side Grid Layout -->
        <div id="menu-container" class="grid grid-cols-2 gap-4">
            <p class="col-span-2 text-center text-sm text-gray-400 py-8">Connecting to database paths...</p>
        </div>

        <!-- Checkout Form Panel -->
        <div class="mt-8 bg-white border border-gray-200 rounded-2xl p-5 shadow-sm space-y-4">
            <h3 class="text-xs font-black uppercase text-red-700 tracking-wider border-b pb-2">Delivery & Customer Details</h3>
            
            <div class="space-y-3">
                <input type="text" id="cust-name" placeholder="Customer Name" class="w-full border border-gray-300 p-2.5 rounded-xl text-sm font-semibold focus:outline-none focus:border-red-700">
                <input type="tel" id="cust-phone" placeholder="Mobile Number" class="w-full border border-gray-300 p-2.5 rounded-xl text-sm font-semibold focus:outline-none focus:border-red-700">
                
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 px-1">Delivery Time / Train Info (Manual)</label>
                    <input type="text" id="cust-slot-manual" placeholder="e.g., Coach S4 - 12:40 PM" class="w-full border border-gray-300 p-2.5 rounded-xl text-sm font-semibold focus:outline-none focus:border-red-700 bg-gray-50">
                </div>
            </div>
        </div>
    </div>

    <!-- Fixed Floating Bottom Purchase Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-3 shadow-xl z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider block">Total Amount</span>
                <span class="text-xl font-black text-gray-900">₹<span id="ui-grand-total">0</span></span>
            </div>
            <button onclick="submitParcelOrder()" class="bg-red-700 hover:bg-red-800 text-white font-extrabold text-sm px-6 py-3 rounded-xl shadow-md uppercase tracking-wider transition">
                Place Order 🚀
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBjG-vnr8B4-tQpPyflqdY99OBvLuZRkoc",
            authDomain: "shirdi-project.firebaseapp.com",
            databaseURL: "https://shirdi-project-default-rtdb.firebaseio.com",
            projectId: "shirdi-project",
            storageBucket: "shirdi-project.firebasestorage.app",
            messagingSenderId: "236969291601",
            appId: "1:236969291601:web:aca0fdad3bae8b3d10ed70",
            measurementId: "G-NN9PS51LJ8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let globalProducts = [];
        let cartState = {};

        // Helper function to bundle snapshot items safely
        function processIncomingSnapshot(snapshot) {
            const data = snapshot.val();
            if (!data) return false;

            globalProducts = [];
            Object.keys(data).forEach(key => {
                const item = data[key];
                globalProducts.push({
                    id: key,
                    name: item.name || item.itemName || item.title || item.productName || "Unnamed Item",
                    price: Number(item.price || item.itemPrice || item.rate || item.productPrice || 0),
                    img: item.image || item.itemImage || item.imgUrl || item.productImage || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400",
                    badge: item.badge || item.itemBadge || ""
                });
            });

            renderMenuUI();
            calculateTotals();
            return true;
        }

        // SMART MONITOR: Listening on all potential node paths your admin script could be saving to
        let activePathUsed = "";

        db.ref('shiridi_products').on('value', snapshot => {
            if(processIncomingSnapshot(snapshot)) activePathUsed = "shiridi_products";
        });

        db.ref('products').on('value', snapshot => {
            if(!activePathUsed && processIncomingSnapshot(snapshot)) activePathUsed = "products";
        });

        db.ref('items').on('value', snapshot => {
            if(!activePathUsed && processIncomingSnapshot(snapshot)) activePathUsed = "items";
        });


        // Displays items Side-by-Side (2 Columns)
        function renderMenuUI() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            if (globalProducts.length === 0) {
                container.innerHTML = `<p class="col-span-2 text-center text-sm text-gray-500 py-8">No menu items loaded yet. Check database keys.</p>`;
                return;
            }

            globalProducts.forEach(item => {
                const qty = cartState[item.id] || 0;
                const card = document.createElement('div');
                
                card.className = "bg-white border border-gray-200 rounded-3xl p-4 flex flex-col items-center justify-between text-center relative shadow-sm hover:border-red-200 transition";
                card.innerHTML = `
                    ${item.badge ? `<span class="absolute top-2 left-2 bg-blue-600 text-white text-[8px] font-black px-1.5 py-0.5 rounded shadow-sm uppercase">${item.badge}</span>` : ''}
                    <div class="h-28 w-full flex items-center justify-center mb-2">
                        <img src="${item.img}" alt="${item.name}" class="max-h-full max-w-full object-contain rounded-xl" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400'">
                    </div>
                    <h3 class="text-xs font-extrabold text-gray-800 line-clamp-2 px-1 mb-1">${item.name}</h3>
                    <p class="text-sm font-black text-red-600 mb-3">₹${item.price}</p>
                    
                    <!-- Stepper UI -->
                    <div class="flex items-center justify-between w-full max-w-[105px] bg-gray-50 p-1 rounded-full border border-gray-100">
                        <button onclick="adjustQty('${item.id}', -1)" class="w-7 h-7 rounded-full bg-white text-red-600 border border-gray-200 font-black flex items-center justify-center shadow-sm text-sm select-none hover:bg-gray-100">-</button>
                        <span class="font-black text-xs text-gray-800">${qty}</span>
                        <button onclick="adjustQty('${item.id}', 1)" class="w-7 h-7 rounded-full bg-red-700 text-white font-black flex items-center justify-center shadow-md text-sm select-none hover:bg-red-800">+</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function adjustQty(id, change) {
            const current = cartState[id] || 0;
            const updated = current + change;
            if (updated <= 0) delete cartState[id];
            else cartState[id] = updated;
            
            renderMenuUI();
            calculateTotals();
        }

        function calculateTotals() {
            let total = 0;
            globalProducts.forEach(item => {
                if(cartState[item.id]) total += (cartState[item.id] * item.price);
            });
            document.getElementById('ui-grand-total').innerText = total;
            return total;
        }

        function submitParcelOrder() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const manualSlot = document.getElementById('cust-slot-manual').value.trim();
            const total = calculateTotals();

            if(!name || !phone || !manualSlot) {
                alert("Please complete Name, Mobile, and Delivery Details.");
                return;
            }

            let itemsSummaryParts = [];
            globalProducts.forEach(i => {
                if(cartState[i.id]) itemsSummaryParts.push(`${i.name} (${cartState[i.id]}x)`);
            });

            if(itemsSummaryParts.length === 0) {
                alert("Please add items to your card first!");
                return;
            }

            const now = new Date();
            const newOrder = {
                customerName: name,
                customerPhone: phone,
                deliveryTimeSlot: manualSlot,
                itemsSummary: itemsSummaryParts.join(", "),
                grandTotal: total,
                status: "Received",
                paymentVerified: false,
                dateStr: now.toLocaleDateString('en-IN'),
                timeStr: now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
            };

            db.ref('shiridi_orders').push(newOrder)
                .then(() => {
                    alert("🎉 Order Sent Successfully to Kitchen!");
                    cartState = {};
                    document.getElementById('cust-name').value = '';
                    document.getElementById('cust-phone').value = '';
                    document.getElementById('cust-slot-manual').value = '';
                    renderMenuUI();
                    calculateTotals();
                })
                .catch(err => alert("Transmission Error: " + err.message));
        }
    </script>
</body>
</html>
