<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Krishna Caterers - Shiridi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen p-4 font-sans">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden">
        
        <!-- Header: Deep Red Banner -->
        <div class="bg-red-700 text-white p-6 text-center shadow-md">
            <h1 class="text-3xl font-extrabold tracking-wide">Sai Krishna Caterers</h1>
            <p class="text-red-100 text-sm font-medium mt-1">Shiridi</p>
            <span class="inline-block mt-3 bg-white text-red-700 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wider shadow-sm">
                Take away Train parcels
            </span>
        </div>

        <div class="p-6 space-y-6">
            <!-- Action Controls -->
            <div class="flex justify-end">
                <button onclick="cancelEntireOrder()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-xs font-bold transition border border-gray-300 shadow-sm">
                    🚫 Cancel Order
                </button>
            </div>

            <!-- Food Menu Container (Updates automatically in real-time) -->
            <div>
                <h3 class="text-sm font-bold uppercase tracking-wider text-red-700 mb-3 border-b pb-1">🍱 Select Items</h3>
                <div id="menu-container" class="space-y-3">
                    <p class="text-center text-xs text-gray-500 py-4">Loading live delicious train parcels...</p>
                </div>
            </div>

            <!-- Cart Summary -->
            <div class="bg-red-50 p-4 rounded-xl border border-red-100">
                <div class="flex justify-between items-center text-base font-bold text-gray-800">
                    <span>Grand Total:</span>
                    <span class="text-red-700 text-2xl font-extrabold">₹<span id="grand-total">0</span></span>
                </div>
            </div>

            <!-- Customer Form -->
            <div class="space-y-4 bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-inner">
                <h3 class="text-xs font-bold uppercase tracking-wider text-red-700">Passenger & Delivery Details</h3>
                
                <div>
                    <label class="block text-xs font-bold mb-1 text-gray-700">Full Name</label>
                    <input type="text" id="cust-name" class="w-full bg-white border border-gray-300 rounded p-2.5 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent" placeholder="Enter passenger name">
                </div>
                
                <div>
                    <label class="block text-xs font-bold mb-1 text-gray-700">WhatsApp Mobile Number</label>
                    <input type="tel" id="cust-phone" class="w-full bg-white border border-gray-300 rounded p-2.5 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent" placeholder="10-digit number">
                </div>
                
                <!-- Simplified Delivery Time Dropdown Selector -->
                <div>
                    <label class="block text-xs font-bold mb-1 text-gray-700">Expected Delivery Time Slot</label>
                    <select id="cust-time" class="w-full bg-white border border-gray-300 rounded p-2.5 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent">
                        <option value="">-- Select Time Slot --</option>
                        <option value="Morning (06:00 AM - 09:00 AM)">Morning (06:00 AM - 09:00 AM)</option>
                        <option value="Mid-Day (09:00 AM - 12:00 PM)">Mid-Day (09:00 AM - 12:00 PM)</option>
                        <option value="Lunch Hour (12:00 PM - 03:00 PM)">Lunch Hour (12:00 PM - 03:00 PM)</option>
                        <option value="Afternoon (03:00 PM - 06:00 PM)">Afternoon (03:00 PM - 06:00 PM)</option>
                        <option value="Dinner Hour (06:00 PM - 09:00 PM)">Dinner Hour (06:00 PM - 09:00 PM)</option>
                        <option value="Late Night (09:00 PM - 11:59 PM)">Late Night (09:00 PM - 11:59 PM)</option>
                    </select>
                </div>
            </div>

            <!-- Payment Step -->
            <div class="bg-gray-50 border-2 border-dashed border-red-200 text-gray-900 p-4 rounded-xl text-center shadow-inner hidden" id="payment-box">
                <p class="text-xs font-bold text-red-700 uppercase tracking-tight mb-3">Scan QR to pay & send screenshot via WhatsApp</p>
                <div class="flex justify-center mb-3">
                    <img id="payment-qr" src="" alt="Payment QR Code" class="w-44 h-44 border border-gray-300 p-2 bg-white rounded-lg shadow-sm">
                </div>
                <p class="text-base font-extrabold text-gray-800 mb-3">Amount Due: <span class="text-red-700">₹<span id="qr-amount">0</span></span></p>
                <button onclick="submitOrderToFirebase()" class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-2.5 rounded-lg transition shadow-md tracking-wider text-sm uppercase">
                    ✅ Done! Place Order
                </button>
            </div>

            <!-- Primary Actions -->
            <div class="space-y-3 pt-2">
                <!-- Text changed from "Generate Bill Total" to "Total bill" -->
                <button id="btn-total" onclick="calculateTotalAndShowQR()" class="w-full bg-red-700 hover:bg-red-800 text-white font-extrabold py-3.5 rounded-xl transition text-center shadow-md uppercase tracking-wider text-sm">
                    💰 Total bill
                </button>
                <button onclick="shareAppLink()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-semibold py-2.5 rounded-xl transition text-xs flex items-center justify-center gap-2 shadow-sm">
                    🔗 Share App Link
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBjG-vnr8B4-tQpPyflqdY99OBvLuZRkoc",
            authDomain: "shirdi-project.firebaseapp.com",
            databaseURL: "https://shirdi-project-default-rtdb.firebaseio.com",
            projectId: "shirdi-project",
            storageBucket: "shirdi-project.firebasestorage.app",
            messagingSenderId: "236969291601",
            appId: "1:236969291601:web:aca0fdad3bae8b3d10ed70",
            measurementId: "G-NN9PS51LJ8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentLiveMenu = {};
        let cart = {};

        // Automatic live snapshot updating eliminates the need for manual refreshes
        db.ref('shiridi_menu').on('value', snapshot => {
            currentLiveMenu = snapshot.val() || {};
            renderMenuUI();
        });

        function renderMenuUI() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            
            const keys = Object.keys(currentLiveMenu);
            if(keys.length === 0) {
                container.innerHTML = `<p class="text-center text-xs text-gray-500 py-6 font-medium">The menu database is empty. Please configure items in your Admin panel.</p>`;
                return;
            }

            keys.forEach(id => {
                const item = currentLiveMenu[id];
                if(cart[id] === undefined) cart[id] = 0;
                
                const itemEl = document.createElement('div');
                itemEl.className = "flex items-center justify-between bg-white p-3 rounded-xl border border-gray-200 shadow-sm hover:border-red-200 transition";
                itemEl.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <img src="${item.image}" class="w-14 h-14 object-cover rounded-lg border border-gray-200 bg-gray-100" alt="${item.name}">
                        <div>
                            <h4 class="font-bold text-sm leading-tight text-gray-900">${item.name}</h4>
                            <p class="text-red-700 text-xs font-bold mt-0.5">₹${item.price}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 bg-gray-50 rounded-lg p-1 border border-gray-200">
                        <button onclick="updateQty('${id}', -1)" class="w-7 h-7 bg-white hover:bg-gray-200 text-gray-800 rounded border border-gray-300 font-bold text-sm flex items-center justify-center transition shadow-sm">-</button>
                        <span id="qty-${id}" class="w-6 text-center font-bold text-sm text-gray-800">${cart[id]}</span>
                        <button onclick="updateQty('${id}', 1)" class="w-7 h-7 bg-white hover:bg-gray-200 text-gray-800 rounded border border-gray-300 font-bold text-sm flex items-center justify-center transition shadow-sm">+</button>
                    </div>
                `;
                container.appendChild(itemEl);
            });
            updateGrandTotalUI();
        }

        function updateQty(id, change) {
            cart[id] = Math.max(0, (cart[id] || 0) + change);
            if(document.getElementById(`qty-${id}`)) {
                document.getElementById(`qty-${id}`).innerText = cart[id];
            }
            updateGrandTotalUI();
        }

        function getGrandTotal() {
            return Object.keys(currentLiveMenu).reduce((sum, id) => {
                return sum + ((cart[id] || 0) * (currentLiveMenu[id].price || 0));
            }, 0);
        }

        function updateGrandTotalUI() {
            document.getElementById('grand-total').innerText = getGrandTotal();
        }

        function calculateTotalAndShowQR() {
            const total = getGrandTotal();
            if(total <= 0) {
                alert("Please add at least one item to your parcel cart.");
                return;
            }
            
            const upiId = "saikrishnacaterers@upi"; 
            const merchantName = "Sai Krishna Caterers Shiridi";
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(`upi://pay?pa=${upiId}&pn=${merchantName}&am=${total}&cu=INR`)}`;
            
            document.getElementById('qr-amount').innerText = total;
            document.getElementById('payment-qr').src = qrUrl;
            document.getElementById('payment-box').classList.remove('hidden');
            document.getElementById('payment-box').scrollIntoView({ behavior: 'smooth' });
        }

        function submitOrderToFirebase() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const timeSlot = document.getElementById('cust-time').value;
            const total = getGrandTotal();

            if(!name || !phone || !timeSlot) {
                alert("Please fill out your Name, Mobile, and Delivery Time Slot details.");
                return;
            }

            let purchasedItems = [];
            Object.keys(currentLiveMenu).forEach(id => {
                if(cart[id] > 0) {
                    purchasedItems.push(`${currentLiveMenu[id].name} (x${cart[id]})`);
                }
            });

            const orderPayload = {
                customerName: name,
                customerPhone: phone,
                deliveryTimeSlot: timeSlot,
                itemsSummary: purchasedItems.join(', '),
                grandTotal: total,
                status: "Received", 
                paymentVerified: false, 
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                dateStr: new Date().toLocaleDateString(),
                timeStr: new Date().toLocaleTimeString()
            };

            db.ref('shiridi_orders').push(orderPayload)
                .then(() => {
                    alert("Order submitted successfully to Kitchen! Redirecting to WhatsApp to send payment proof.");
                    const waText = encodeURIComponent(`Hi Sai Krishna Caterers, I just placed a train parcel order for ₹${total}.\nName: ${name}\nDelivery: ${timeSlot}`);
                    window.open(`https://wa.me/9154095125?text=${waText}`, '_blank');
                    cancelEntireOrder(); 
                })
                .catch(err => alert("Database Error: " + err.message));
        }

        function cancelEntireOrder() {
            cart = {};
            document.getElementById('cust-name').value = '';
            document.getElementById('cust-phone').value = '';
            document.getElementById('cust-time').value = '';
            document.getElementById('payment-box').classList.add('hidden');
            renderMenuUI();
        }

        function shareAppLink() {
            if (navigator.share) {
                navigator.share({
                    title: 'Sai Krishna Caterers',
                    text: 'Order fresh take away train parcels from Shiridi!',
                    url: window.location.href
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("App link copied to your clipboard!");
            }
        }
    </script>
</body>
</html>
