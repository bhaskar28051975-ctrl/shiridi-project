<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaskar Food - Shirdi Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen font-sans pb-24">

    <!-- Top Branding Header (Styled Verbatim from Screenshot_20260614-144704.png) -->
    <div class="bg-white border-b border-gray-200 sticky top-0 z-50 px-4 py-3 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-black text-red-600 italic tracking-tight uppercase">BHASKAR FOOD</h1>
                <p class="text-xs font-bold text-gray-500 mt-0.5">Delivery Services At <span class="text-red-600">Where You Are.</span></p>
                <a href="tel:9154095125" class="text-sm font-extrabold text-green-600 flex items-center gap-1 mt-1">
                    📞 9154095125
                </a>
            </div>
            <div class="flex gap-2">
                <button class="border border-red-200 text-red-600 font-bold text-xs px-3 py-1.5 rounded-full flex items-center gap-1 bg-red-50/50 hover:bg-red-50 tracking-wider uppercase">
                    <span>🔄</span> Share
                </button>
                <button onclick="window.location.reload()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold text-xs px-3 py-1.5 rounded-lg tracking-wider uppercase">
                    Refresh
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-6">
        <!-- Category Title Group Layout -->
        <div class="flex items-center gap-3 mb-6">
            <div class="w-1.5 h-8 bg-red-600 rounded-full"></div>
            <h2 class="text-2xl font-black uppercase text-slate-800 tracking-wide italic">COOL DRINKS</h2>
        </div>

        <!-- Dynamic Menu Grid matching Screenshot_20260614-144704.png -->
        <div id="menu-container" class="grid grid-cols-2 gap-4">
            <!-- Items populate dynamically below -->
        </div>

        <!-- Checkout Section (With Manual Delivery Time Entry) -->
        <div class="mt-8 bg-white border border-gray-200 rounded-2xl p-5 shadow-sm space-y-4">
            <h3 class="text-sm font-black uppercase text-red-600 tracking-wider border-b pb-2">Customer & Train Details</h3>
            
            <div class="space-y-3">
                <input type="text" id="cust-name" placeholder="Customer Name" class="w-full border border-gray-300 p-2.5 rounded-xl text-sm font-semibold focus:outline-none focus:border-red-500">
                <input type="tel" id="cust-phone" placeholder="Mobile Number" class="w-full border border-gray-300 p-2.5 rounded-xl text-sm font-semibold focus:outline-none focus:border-red-500">
                
                <!-- Manual Slot Entry System replacing the Dropdown Menu -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 px-1">Delivery Time / Train Schedule (Manual)</label>
                    <input type="text" id="cust-slot-manual" placeholder="e.g., 04:30 PM or Train 12626 Coach S4" class="w-full border border-gray-300 p-2.5 rounded-xl text-sm font-semibold focus:outline-none focus:border-red-500 bg-gray-50">
                </div>
            </div>
        </div>
    </div>

    <!-- Fixed Floating Bottom Status Bar Panel -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-3 shadow-xl z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider block">Grand Total</span>
                <span class="text-xl font-black text-slate-900">₹<span id="ui-grand-total">0</span></span>
            </div>
            <button onclick="submitParcelOrder()" class="bg-red-600 hover:bg-red-700 text-white font-extrabold text-sm px-6 py-3 rounded-xl shadow-md uppercase tracking-wider transition">
                Book Order 🚀
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBjG-vnr8B4-tQpPyflqdY99OBvLuZRkoc",
            authDomain: "shirdi-project.firebaseapp.com",
            databaseURL: "https://shirdi-project-default-rtdb.firebaseio.com",
            projectId: "shirdi-project",
            storageBucket: "shirdi-project.firebasestorage.app",
            messagingSenderId: "236969291601",
            appId: "1:236969291601:web:aca0fdad3bae8b3d10ed70",
            measurementId: "G-NN9PS51LJ8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Sample Inventory Data mirroring product configurations
        const productsList = [
            { id: "p1", name: "Sprit 250 ml", price: 26, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400" },
            { id: "p2", name: "Coca cola 250ml", price: 26, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400", badge: "PACK OF 28" },
            { id: "p3", name: "Fanta 250ml", price: 26, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400" },
            { id: "p4", name: "Thumbs up 250ml", price: 26, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400" }
        ];

        let cartState = {};

        function renderMenuUI() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            productsList.forEach(item => {
                const qty = cartState[item.id] || 0;
                const card = document.createElement('div');
                
                // Matches the visual layout structure seen in Screenshot_20260614-144704.png
                card.className = "bg-white border border-gray-200 rounded-3xl p-4 flex flex-col items-center justify-between text-center relative shadow-sm";
                card.innerHTML = `
                    ${item.badge ? `<span class="absolute top-2 left-2 bg-blue-600 text-white text-[8px] font-black px-1.5 py-1 rounded-md shadow-sm line-clamp-1">⭐ ${item.badge}</span>` : ''}
                    <div class="h-32 w-full flex items-center justify-center mb-3">
                        <img src="${item.img}" alt="${item.name}" class="max-h-full max-w-full object-contain rounded-xl">
                    </div>
                    <h3 class="text-xs font-extrabold text-slate-800 line-clamp-2 px-1 mb-1">${item.name}</h3>
                    <p class="text-sm font-black text-red-600 mb-3">₹${item.price}</p>
                    
                    <!-- App Styled Rounded Stepper Controls -->
                    <div class="flex items-center justify-between w-full max-w-[110px] bg-gray-50/80 p-1 rounded-full border border-gray-100">
                        <button onclick="adjustQty('${item.id}', -1)" class="w-8 h-8 rounded-full bg-red-50 text-red-600 font-black flex items-center justify-center shadow-sm text-base focus:outline-none select-none hover:bg-red-100">-</button>
                        <span class="font-black text-sm text-slate-800">${qty}</span>
                        <button onclick="adjustQty('${item.id}', 1)" class="w-8 h-8 rounded-full bg-red-600 text-white font-black flex items-center justify-center shadow-md text-base focus:outline-none select-none hover:bg-red-700">+</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function adjustQty(id, change) {
            const current = cartState[id] || 0;
            const updated = current + change;
            if (updated <= 0) delete cartState[id];
            else cartState[id] = updated;
            
            renderMenuUI();
            calculateTotals();
        }

        function calculateTotals() {
            let total = 0;
            productsList.forEach(item => {
                if(cartState[item.id]) total += (cartState[item.id] * item.price);
            });
            document.getElementById('ui-grand-total').innerText = total;
            return total;
        }

        function submitParcelOrder() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const manualSlot = document.getElementById('cust-slot-manual').value.trim(); // Captured value
            const total = calculateTotals();

            if(!name || !phone || !manualSlot) {
                alert("Please complete Name, Mobile, and your Manual Time/Train details.");
                return;
            }

            let itemsSummaryParts = [];
            productsList.forEach(i => {
                if(cartState[i.id]) itemsSummaryParts.push(`${i.name} (${cartState[i.id]}x)`);
            });

            if(itemsSummaryParts.length === 0) {
                alert("Your cart is currently empty!");
                return;
            }

            const now = new Date();
            const newOrder = {
                customerName: name,
                customerPhone: phone,
                deliveryTimeSlot: manualSlot, // Written explicitly to the Firebase reference key
                itemsSummary: itemsSummaryParts.join(", "),
                grandTotal: total,
                status: "Received",
                paymentVerified: false,
                dateStr: now.toLocaleDateString('en-IN'),
                timeStr: now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
            };

            db.ref('shiridi_orders').push(newOrder)
                .then(() => {
                    alert("🎉 Order Booked Successfully via Manual Routing!");
                    cartState = {};
                    document.getElementById('cust-name').value = '';
                    document.getElementById('cust-phone').value = '';
                    document.getElementById('cust-slot-manual').value = '';
                    renderMenuUI();
                    calculateTotals();
                })
                .catch(err => alert("Database transmission issue: " + err.message));
        }

        // Initialize display configuration on document generation load
        renderMenuUI();
    </script>
</body>
</html>
