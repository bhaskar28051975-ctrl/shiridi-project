<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management - Shiridi Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #7f1d1d; }
    </style>
</head>
<body class="text-white min-h-screen p-4 font-sans">

    <div class="max-w-4xl mx-auto">
        <!-- Header Banner -->
        <div class="bg-red-950 p-4 rounded-xl border border-red-800 mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Sai Krishna Caterers Menu Admin</h1>
                <p class="text-xs text-red-300 uppercase tracking-widest font-semibold">Shiridi Project Control Hub</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Left Side: Add / Edit Form -->
            <div class="bg-red-950/60 p-5 rounded-xl border border-red-800 h-fit">
                <h2 id="form-title" class="text-base font-bold uppercase text-yellow-400 mb-4 tracking-wider">✨ Add New Food Item</h2>
                
                <input type="hidden" id="item-id">
                
                <div class="space-y-4 text-xs">
                    <div>
                        <label class="block mb-1 text-gray-300 font-bold">Item Name</label>
                        <input type="text" id="menu-name" class="w-full bg-red-900 border border-red-700 rounded p-2 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="e.g., Special Train Meal Tray">
                    </div>
                    <div>
                        <label class="block mb-1 text-gray-300 font-bold">Price (₹)</label>
                        <input type="number" id="menu-price" class="w-full bg-red-900 border border-red-700 rounded p-2 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="e.g., 140">
                    </div>
                    <div>
                        <label class="block mb-1 text-gray-300 font-bold">Image URL</label>
                        <input type="text" id="menu-image" class="w-full bg-red-900 border border-red-700 rounded p-2 text-white focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="Paste image link here">
                        <p class="text-[10px] text-gray-400 mt-1">Tip: You can copy any food image link from Google or Unsplash and paste it here.</p>
                    </div>

                    <div class="pt-2 flex gap-2">
                        <button id="btn-save" onclick="saveItem()" class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-red-950 font-extrabold py-2 rounded transition uppercase tracking-wider">
                            Save Item
                        </button>
                        <button id="btn-cancel" onclick="resetForm()" class="bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded transition hidden">
                            Cancel
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Side: Live Menu List Grid -->
            <div class="md:col-span-2 bg-red-950/40 p-5 rounded-xl border border-red-800">
                <h2 class="text-base font-bold uppercase text-green-400 mb-4 border-b border-red-800 pb-2 tracking-wider">📋 Current Live Items</h2>
                <div id="admin-menu-container" class="space-y-3 max-h-[70vh] overflow-y-auto pr-1">
                    <!-- Items display here dynamically -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBjG-vnr8B4-tQpPyflqdY99OBvLuZRkoc",
            authDomain: "shirdi-project.firebaseapp.com",
            databaseURL: "https://shirdi-project-default-rtdb.firebaseio.com",
            projectId: "shirdi-project",
            storageBucket: "shirdi-project.firebasestorage.app",
            messagingSenderId: "236969291601",
            appId: "1:236969291601:web:aca0fdad3bae8b3d10ed70",
            measurementId: "G-NN9PS51LJ8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Realtime sync of menu records
        db.ref('shiridi_menu').on('value', snapshot => {
            const data = snapshot.val();
            const container = document.getElementById('admin-menu-container');
            container.innerHTML = '';

            if(!data) {
                container.innerHTML = `<p class="text-sm text-gray-400 text-center py-6">No items found. Add your first item using the left panel!</p>`;
                return;
            }

            Object.keys(data).forEach(key => {
                const item = data[key];
                const row = document.createElement('div');
                row.className = "flex items-center justify-between bg-red-950 border border-red-800 p-3 rounded-xl";
                row.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <img src="${item.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=120'}" class="w-12 h-12 object-cover rounded-lg border border-red-700 bg-red-900" alt="">
                        <div>
                            <h4 class="font-bold text-sm leading-tight text-white">${item.name}</h4>
                            <p class="text-yellow-400 text-xs font-bold mt-0.5">₹${item.price}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 text-xs">
                        <button onclick="editItemForm('${key}', '${item.name}', ${item.price}, '${item.image}')" class="bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded font-semibold transition">
                            ✏️ Edit Price/Img
                        </button>
                        <button onclick="deleteItem('${key}')" class="bg-red-700 hover:bg-red-600 px-3 py-1.5 rounded font-semibold transition">
                            🗑️ Delete
                        </button>
                    </div>
                `;
                container.appendChild(row);
            });
        });

        // Add or Update functional execution
        function saveItem() {
            const id = document.getElementById('item-id').value;
            const name = document.getElementById('menu-name').value.trim();
            const price = document.getElementById('menu-price').value.trim();
            const image = document.getElementById('menu-image').value.trim();

            if(!name || !price) {
                alert("Please enter both the item name and price.");
                return;
            }

            const itemData = {
                name: name,
                price: Number(price),
                image: image || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=120"
            };

            if(id) {
                // Update Existing Node Item
                db.ref(`shiridi_menu/${id}`).update(itemData)
                    .then(() => { alert("Item updated successfully!"); resetForm(); })
                    .catch(err => alert("Error: " + err.message));
            } else {
                // Push Fresh New Item
                db.ref('shiridi_menu').push(itemData)
                    .then(() => { alert("New item added to live menu!"); resetForm(); })
                    .catch(err => alert("Error: " + err.message));
            }
        }

        // Delete confirmation hook
        function deleteItem(key) {
            if(confirm("Are you sure you want to completely remove this food item from the menu?")) {
                db.ref(`shiridi_menu/${key}`).remove()
                    .then(() => alert("Item deleted successfully."))
                    .catch(err => alert("Error: " + err.message));
            }
        }

        // Fill form fields to execute edits
        function editItemForm(key, name, price, image) {
            document.getElementById('item-id').value = key;
            document.getElementById('menu-name').value = name;
            document.getElementById('menu-price').value = price;
            document.getElementById('menu-image').value = image === "undefined" ? "" : image;
            
            document.getElementById('form-title').innerText = "✏️ Edit Food Item";
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function resetForm() {
            document.getElementById('item-id').value = '';
            document.getElementById('menu-name').value = '';
            document.getElementById('menu-price').value = '';
            document.getElementById('menu-image').value = '';
            
            document.getElementById('form-title').innerText = "✨ Add New Food Item";
            document.getElementById('btn-cancel').classList.add('hidden');
        }
    </script>
</body>
</html>
