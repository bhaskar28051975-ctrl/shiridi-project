<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management - Shiridi Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen p-4 font-sans">

    <div class="max-w-4xl mx-auto">
        <!-- Header Banner Area -->
        <div class="bg-red-700 text-white p-5 rounded-xl shadow-md mb-6 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img id="admin-header-logo" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=120" class="w-14 h-14 object-cover rounded-xl border border-white/20 bg-white" alt="Logo">
                <div>
                    <h1 id="admin-header-title" class="text-2xl font-bold tracking-tight">Sai Krishna Caterers Menu Admin</h1>
                    <p class="text-xs text-red-100 uppercase tracking-widest font-semibold mt-0.5">Shiridi Project Control Hub</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Left Side Controls Framework -->
            <div class="space-y-6">
                
                <!-- NEW: Manage Header Setup Details Dynamic Box Row -->
                <div class="bg-white p-5 rounded-xl shadow border border-gray-200">
                    <h2 class="text-sm font-extrabold uppercase text-gray-800 mb-3 tracking-wider border-b pb-2 flex items-center">⚙️ App Identity Branding</h2>
                    <div class="space-y-3 text-xs">
                        <div>
                            <label class="block mb-1 text-gray-700 font-bold">Hotel / Title Name</label>
                            <input type="text" id="setup-hotel-name" class="w-full bg-gray-50 border border-gray-300 rounded p-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-red-600">
                        </div>
                        <div>
                            <label class="block mb-1 text-gray-700 font-bold">Hotel Logo Image URL</label>
                            <input type="text" id="setup-hotel-image" class="w-full bg-gray-50 border border-gray-300 rounded p-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-red-600" placeholder="Paste branding logo link">
                        </div>
                        <button onclick="saveAppIdentitySettings()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 rounded transition uppercase tracking-wider text-[11px]">
                            Update Identity Settings
                        </button>
                    </div>
                </div>

                <!-- Food Operations Input Node Form Box Wrapper -->
                <div class="bg-white p-5 rounded-xl shadow border border-gray-200">
                    <h2 id="form-title" class="text-sm font-extrabold uppercase text-red-700 mb-4 tracking-wider">✨ Add New Food Item</h2>
                    <input type="hidden" id="item-id">
                    
                    <div class="space-y-4 text-xs">
                        <div>
                            <label class="block mb-1 text-gray-700 font-bold">Item Name</label>
                            <input type="text" id="menu-name" class="w-full bg-gray-50 border border-gray-300 rounded p-2.5 text-gray-900 focus:outline-none focus:ring-2 focus:ring-red-600" placeholder="e.g., Special Train Meal Tray">
                        </div>
                        <div>
                            <label class="block mb-1 text-gray-700 font-bold">Price (₹)</label>
                            <input type="number" id="menu-price" class="w-full bg-gray-50 border border-gray-300 rounded p-2.5 text-gray-900 focus:outline-none focus:ring-2 focus:ring-red-600" placeholder="e.g., 140">
                        </div>
                        <div>
                            <label class="block mb-1 text-gray-700 font-bold">Image URL</label>
                            <input type="text" id="menu-image" class="w-full bg-gray-50 border border-gray-300 rounded p-2.5 text-gray-900 focus:outline-none focus:ring-2 focus:ring-red-600" placeholder="Paste image link here">
                            <p class="text-[10px] text-gray-500 mt-1">Copy and paste any direct link to a food photo here.</p>
                        </div>

                        <div class="pt-2 flex gap-2">
                            <button id="btn-save" onclick="saveItem()" class="flex-1 bg-red-700 hover:bg-red-800 text-white font-bold py-2.5 rounded transition uppercase tracking-wider shadow-sm">
                                Save Item
                            </button>
                            <button id="btn-cancel" onclick="resetForm()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-2.5 rounded transition font-bold hidden">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Right Side Dynamic Listing Column Area Frame -->
            <div class="md:col-span-2 bg-white p-5 rounded-xl shadow border border-gray-200">
                <h2 class="text-sm font-extrabold uppercase text-gray-800 mb-4 border-b border-gray-200 pb-2 tracking-wider">📋 Current Live Items</h2>
                <div id="admin-menu-container" class="space-y-3 max-h-[75vh] overflow-y-auto pr-1">
                    <!-- Dynamic Rows Insertion Target Output Node Point -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBjG-vnr8B4-tQpPyflqdY99OBvLuZRkoc",
            authDomain: "shirdi-project.firebaseapp.com",
            databaseURL: "https://shirdi-project-default-rtdb.firebaseio.com",
            projectId: "shirdi-project",
            storageBucket: "shirdi-project.firebasestorage.app",
            messagingSenderId: "236969291601",
            appId: "1:236969291601:web:aca0fdad3bae8b3d10ed70",
            measurementId: "G-NN9PS51LJ8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Sync & Watch Global App Branding Metadata Node Changes
        db.ref('shiridi_settings').on('value', snapshot => {
            const settings = snapshot.val() || {};
            const hotelName = settings.hotelName || "Sai Krishna Caterers";
            const hotelImage = settings.hotelImage || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=120";
            
            document.getElementById('admin-header-title').innerText = hotelName + " Admin";
            document.getElementById('admin-header-logo').src = hotelImage;
            
            // Populate the inputs if user isn't currently interacting typing things manually
            if(document.activeElement !== document.getElementById('setup-hotel-name')) {
                document.getElementById('setup-hotel-name').value = hotelName;
            }
            if(document.activeElement !== document.getElementById('setup-hotel-image')) {
                document.getElementById('setup-hotel-image').value = hotelImage;
            }
        });

        function saveAppIdentitySettings() {
            const hName = document.getElementById('setup-hotel-name').value.trim();
            const hImg = document.getElementById('setup-hotel-image').value.trim();
            
            if(!hName) {
                alert("Hotel Name field cannot be empty.");
                return;
            }
            
            db.ref('shiridi_settings').set({
                hotelName: hName,
                hotelImage: hImg || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=120"
            }).then(() => alert("Identity settings synced across application nodes successfully!"))
              .catch(err => alert("Error syncing layout properties: " + err.message));
        }

        db.ref('shiridi_menu').on('value', snapshot => {
            const data = snapshot.val();
            const container = document.getElementById('admin-menu-container');
            container.innerHTML = '';

            if(!data) {
                container.innerHTML = `<p class="text-sm text-gray-400 text-center py-6">No items found. Add your first item using the left panel!</p>`;
                return;
            }

            Object.keys(data).forEach(key => {
                const item = data[key];
                const row = document.createElement('div');
                row.className = "flex items-center justify-between bg-gray-50 border border-gray-200 p-3 rounded-xl shadow-sm";
                row.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <!-- Standardized Fixed Uniform 1:1 Aspect Frame Thumbnail Cover Box inside Admin -->
                        <div class="w-12 h-12 overflow-hidden rounded-lg border border-gray-200 bg-white flex items-center justify-center shrink-0">
                            <img src="${item.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=120'}" class="w-full h-full object-cover" alt="">
                        </div>
                        <div>
                            <h4 class="font-bold text-sm leading-tight text-gray-900">${item.name}</h4>
                            <p class="text-red-700 text-xs font-bold mt-0.5">₹${item.price}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 text-xs">
                        <button onclick="editItemForm('${key}', '${item.name}', ${item.price}, '${item.image}')" class="bg-white hover:bg-gray-100 border border-gray-300 text-gray-700 px-3 py-1.5 rounded font-bold shadow-sm transition">
                            ✏️ Edit
                        </button>
                        <button onclick="deleteItem('${key}')" class="bg-red-50 hover:bg-red-100 text-red-700 px-3 py-1.5 rounded font-bold transition border border-red-200">
                            🗑️ Delete
                        </button>
                    </div>
                `;
                container.appendChild(row);
            });
        });

        function saveItem() {
            const id = document.getElementById('item-id').value;
            const name = document.getElementById('menu-name').value.trim();
            const price = document.getElementById('menu-price').value.trim();
            const image = document.getElementById('menu-image').value.trim();

            if(!name || !price) {
                alert("Please enter both the item name and price.");
                return;
            }

            const itemData = {
                name: name,
                price: Number(price),
                image: image || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=120"
            };

            if(id) {
                db.ref(`shiridi_menu/${id}`).update(itemData)
                    .then(() => { alert("Item updated successfully!"); resetForm(); })
                    .catch(err => alert("Error: " + err.message));
            } else {
                db.ref('shiridi_menu').push(itemData)
                    .then(() => { alert("New item added to live menu!"); resetForm(); })
                    .catch(err => alert("Error: " + err.message));
            }
        }

        function deleteItem(key) {
            if(confirm("Are you sure you want to completely remove this food item from the menu?")) {
                db.ref(`shiridi_menu/${key}`).remove()
                    .then(() => alert("Item deleted successfully."))
                    .catch(err => alert("Error: " + err.message));
            }
        }

        function editItemForm(key, name, price, image) {
            document.getElementById('item-id').value = key;
            document.getElementById('menu-name').value = name;
            document.getElementById('menu-price').value = price;
            document.getElementById('menu-image').value = (image === "undefined" || image.includes("unsplash.com/photo-1546069901-ba9599a7e63c")) ? "" : image;
            
            document.getElementById('form-title').innerText = "✏️ Edit Food Item";
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function resetForm() {
            document.getElementById('item-id').value = '';
            document.getElementById('menu-name').value = '';
            document.getElementById('menu-price').value = '';
            document.getElementById('menu-image').value = '';
            
            document.getElementById('form-title').innerText = "✨ Add New Food Item";
            document.getElementById('btn-cancel').classList.add('hidden');
        }
    </script>
</body>
</html>
