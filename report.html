<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Insights - Shiridi Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #7f1d1d; }
    </style>
</head>
<body class="text-white min-h-screen p-4 font-sans">

    <div class="max-w-5xl mx-auto">
        <div class="bg-red-950 rounded-2xl p-6 border border-red-800 shadow-2xl mb-6">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight">Sales & Analytics Ledger</h1>
                    <p class="text-red-300 text-sm">Sai Krishna Caterers — Realtime Database Reports</p>
                </div>
                <button onclick="fetchReportsAndAggregate()" class="bg-red-800 hover:bg-red-700 font-bold px-4 py-2 rounded-lg text-sm transition">
                    🔄 Refresh System Data
                </button>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="bg-red-900/60 p-4 rounded-xl border border-red-800 text-center">
                    <p class="text-xs uppercase text-gray-400 font-bold tracking-wider">Total Orders Cleared</p>
                    <span id="metric-count" class="text-4xl font-extrabold text-white">0</span>
                </div>
                <div class="bg-red-900/60 p-4 rounded-xl border border-red-800 text-center">
                    <p class="text-xs uppercase text-gray-400 font-bold tracking-wider">Grand Total Revenue</p>
                    <span class="text-4xl font-extrabold text-yellow-400">₹<span id="metric-revenue">0</span></span>
                </div>
            </div>
        </div>

        <div class="bg-red-950/40 rounded-2xl p-4 border border-red-800">
            <h2 class="text-lg font-bold mb-4 border-b border-red-800 pb-2">Chronological Sales Breakdown</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-gray-200">
                    <thead class="bg-red-950 uppercase text-xs font-bold text-yellow-400 border-b border-red-800">
                        <tr>
                            <th class="p-3">Date/Time</th>
                            <th class="p-3">Customer Info</th>
                            <th class="p-3">Items Summary List</th>
                            <th class="p-3 text-right">Amount Sold</th>
                        </tr>
                    </thead>
                    <tbody id="report-table-body" class="divide-y divide-red-900/50">
                        </tbody>
                </table>
                <div id="empty-state" class="text-center py-8 text-gray-400 font-semibold hidden">
                    No orders recorded in database yet.
                </div>
            </div>
        </div>
    </div>

    <script>
        // Updated with your authentic shirdi-project configurations
        const firebaseConfig = {
            apiKey: "AIzaSyBjG-vnr8B4-tQpPyflqdY99OBvLuZRkoc",
            authDomain: "shirdi-project.firebaseapp.com",
            databaseURL: "https://shirdi-project-default-rtdb.firebaseio.com",
            projectId: "shirdi-project",
            storageBucket: "shirdi-project.firebasestorage.app",
            messagingSenderId: "236969291601",
            appId: "1:236969291601:web:aca0fdad3bae8b3d10ed70",
            measurementId: "G-NN9PS51LJ8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function fetchReportsAndAggregate() {
            db.ref('shiridi_orders').once('value', snapshot => {
                const data = snapshot.val();
                const tbody = document.getElementById('report-table-body');
                tbody.innerHTML = '';

                let runningTotalVolume = 0;
                let runningCount = 0;

                if (!data) {
                    document.getElementById('metric-count').innerText = "0";
                    document.getElementById('metric-revenue').innerText = "0";
                    document.getElementById('empty-state').classList.remove('hidden');
                    return;
                }

                document.getElementById('empty-state').classList.add('hidden');

                const sortedKeys = Object.keys(data).sort((a, b) => {
                    return (data[b].timestamp || 0) - (data[a].timestamp || 0);
                });

                sortedKeys.forEach(key => {
                    const record = data[key];
                    runningCount++;
                    runningTotalVolume += Number(record.grandTotal || 0);

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-red-900/30 transition";
                    tr.innerHTML = `
                        <td class="p-3 font-mono text-xs whitespace-nowrap">
                            <span class="block font-bold text-white">${record.dateStr || 'N/A'}</span>
                            <span class="text-gray-400 text-[10px]">${record.timeStr || ''}</span>
                        </td>
                        <td class="p-3">
                            <div class="font-bold text-yellow-400 text-xs">${record.customerName}</div>
                            <div class="text-[11px] text-gray-400">${record.customerPhone}</div>
                        </td>
                        <td class="p-3 text-xs max-w-xs truncate" title="${record.itemsSummary}">
                            ${record.itemsSummary || '—'}
                        </td>
                        <td class="p-3 text-right font-mono font-bold text-white whitespace-nowrap">
                            ₹${record.grandTotal}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.getElementById('metric-count').innerText = runningCount;
                document.getElementById('metric-revenue').innerText = runningTotalVolume;
            });
        }

        fetchReportsAndAggregate();
    </script>
</body>
</html>
