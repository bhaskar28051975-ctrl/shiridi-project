<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display - Shirdi Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen p-4 font-sans">

    <div class="max-w-4xl mx-auto">
        <div class="bg-red-700 text-white p-5 rounded-xl shadow-md mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight">Sai Krishna Kitchen Display</h1>
                <p class="text-xs text-red-100 uppercase tracking-widest font-semibold mt-0.5">Live Pending Train Orders</p>
            </div>
            <div class="bg-white/10 px-4 py-2 rounded-lg backdrop-blur-sm border border-white/10 text-center">
                <span class="block text-xs text-red-100 font-medium uppercase tracking-wider">Pending Tasks</span>
                <span id="count-pending" class="text-xl font-black">0</span>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="text-sm font-extrabold uppercase text-red-700 tracking-wider border-b border-gray-200 pb-2 flex items-center gap-2">
                🔥 Active Kitchen Orders
            </h2>
            <div id="active-orders-container" class="space-y-4 max-h-[80vh] overflow-y-auto pr-1">
                <p class="text-sm text-gray-500 text-center py-8 bg-white rounded-xl border border-gray-200 shadow-sm">Waiting for incoming food parcel orders...</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBjG-vnr8B4-tQpPyflqdY99OBvLuZRkoc",
            authDomain: "shirdi-project.firebaseapp.com",
            databaseURL: "https://shirdi-project-default-rtdb.firebaseio.com",
            projectId: "shirdi-project",
            storageBucket: "shirdi-project.firebasestorage.app",
            messagingSenderId: "236969291601",
            appId: "1:236969291601:web:aca0fdad3bae8b3d10ed70",
            measurementId: "G-NN9PS51LJ8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Realtime sync tracking for Pending Kitchen Orders
        db.ref('shiridi_orders').on('value', snapshot => {
            const orders = snapshot.val() || {};
            const activeContainer = document.getElementById('active-orders-container');
            activeContainer.innerHTML = '';

            let countPending = 0;
            const orderKeys = Object.keys(orders).reverse(); // Newest orders showing up at top

            orderKeys.forEach(key => {
                const order = orders[key];

                if(order.status === "Received") {
                    countPending++;
                    
                    const card = document.createElement('div');
                    card.className = "bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden hover:border-red-200 transition";
                    
                    // Safety logic if no payment image link structure was assigned explicitly
                    const imageScreenshotUrl = order.receiptScreenshot || "#";
                    const hasValidImage = order.receiptScreenshot ? true : false;

                    card.innerHTML = `
                        <div class="bg-gray-50 border-b border-gray-200 px-4 py-3 flex justify-between items-center flex-wrap gap-2">
                            <div>
                                <h3 class="font-extrabold text-sm text-gray-900">${order.customerName}</h3>
                                <p class="text-[11px] text-gray-500 font-medium">📞 ${order.customerPhone} | 🕒 Slot: <span class="text-red-700 font-bold">${order.deliveryTimeSlot || 'Not Picked'}</span></p>
                            </div>
                            <div>
                                <span class="text-xs font-bold bg-amber-50 text-amber-700 border border-amber-200 px-2 py-0.5 rounded-md uppercase tracking-tight">Preparing</span>
                            </div>
                        </div>
                        <div class="p-4 flex flex-col md:flex-row gap-4 items-start justify-between">
                            
                            <div class="space-y-3 flex-1 w-full">
                                <div class="bg-gray-50 border border-gray-200 p-3 rounded-lg text-sm font-bold text-red-800 leading-relaxed shadow-inner">
                                    🍱 ${order.itemsSummary}
                                </div>
                                <div class="text-sm font-extrabold text-gray-800">
                                    Total Amount: <span class="text-red-700 text-base">₹${order.grandTotal}</span>
                                </div>
                                <div class="flex gap-2 w-full pt-1">
                                    <button onclick="togglePaymentStatus('${key}', ${order.paymentVerified})" class="flex-1 text-xs px-3 py-2 rounded border transition font-bold ${order.paymentVerified ? 'bg-green-50 text-green-700 border-green-200' : 'bg-gray-100 text-gray-600 border-gray-300 hover:bg-gray-200'}">
                                        ${order.paymentVerified ? '💸 Paid (Verified)' : '⚠️ Mark Paid'}
                                    </button>
                                    <button onclick="completeOrder('${key}')" class="flex-1 bg-red-700 hover:bg-red-800 text-white font-bold text-xs px-4 py-2 rounded transition shadow-sm uppercase tracking-wide">
                                        ✔️ Dispatch & Close
                                    </button>
                                </div>
                            </div>

                            <div class="w-full md:w-32 shrink-0 flex flex-col items-center bg-gray-50 border border-gray-200 p-2 rounded-xl text-center">
                                <span class="text-[10px] font-black uppercase text-gray-400 tracking-wider block mb-1">Receipt Proof</span>
                                ${hasValidImage ? `
                                    <a href="${imageScreenshotUrl}" target="_blank" title="Click to view full screen">
                                        <img src="${imageScreenshotUrl}" class="w-24 h-24 object-cover rounded-lg border border-gray-300 shadow-sm hover:scale-105 active:scale-95 transition cursor-pointer bg-white" alt="Transaction Proof">
                                    </a>
                                    <span class="text-[9px] text-gray-400 mt-1 font-semibold">🔍 Click to Expand</span>
                                ` : `
                                    <div class="w-24 h-24 flex items-center justify-center bg-gray-200 text-gray-400 rounded-lg text-xs font-bold">No Image</div>
                                `}
                            </div>

                        </div>
                    `;
                    activeContainer.appendChild(card);
                }
            });

            document.getElementById('count-pending').innerText = countPending;

            if (countPending === 0) {
                activeContainer.innerHTML = `<p class="text-sm text-gray-500 text-center py-8 bg-white rounded-xl border border-gray-200 shadow-sm">All cleared! No active kitchen tickets right now. 🎉</p>`;
            }
        });

        function togglePaymentStatus(key, currentFlag) {
            db.ref(`shiridi_orders/${key}`).update({ paymentVerified: !currentFlag });
        }

        function completeOrder(key) {
            db.ref(`shiridi_orders/${key}`).update({ status: "Completed" });
        }
    </script>
</body>
</html>
